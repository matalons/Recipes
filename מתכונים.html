<html lang="he" dir="rtl">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Heebo', sans-serif;
    background: #0f0a00;
    color: #fff;
    min-height: 100vh;
    direction: rtl;
  }

  .header {
    background: linear-gradient(180deg, #e85d00 0%, #c44e00 100%);
    padding: 16px 16px 12px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(232,93,0,0.5);
  }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .header-icon { font-size: 28px; }
  .header-title { font-size: 22px; font-weight: 900; }
  .header-sub { font-size: 12px; opacity: 0.8; }
  .header-count {
    margin-right: auto;
    background: rgba(255,255,255,0.2);
    border-radius: 20px; padding: 3px 12px;
    font-size: 13px; font-weight: 700;
  }

  .search-bar {
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px; padding: 10px 14px;
    color: #fff; font-size: 15px; width: 100%;
    font-family: 'Heebo', sans-serif;
    outline: none; direction: rtl;
  }
  .search-bar::placeholder { color: rgba(255,255,255,0.5); }

  .filters {
    display: flex; gap: 8px; overflow-x: auto;
    padding: 12px 16px 4px; scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0; padding: 7px 14px;
    border-radius: 50px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 700; font-family: 'Heebo', sans-serif;
    background: rgba(255,255,255,0.1); color: #fff;
    transition: all 0.15s; display: flex; align-items: center; gap: 5px;
  }
  .filter-btn.active { transform: scale(1.05); }
  .filter-count {
    background: rgba(255,255,255,0.25);
    border-radius: 10px; padding: 1px 7px; font-size: 11px;
  }

  .list { padding: 8px 12px 40px; display: flex; flex-direction: column; gap: 8px; }

  .recipe-card {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px; padding: 13px 14px;
    text-decoration: none; color: #fff;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .recipe-card:active { background: rgba(232,93,0,0.25); }

  .platform-icon {
    width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .platform-tiktok { background: #010101; border: 1px solid #333; }
  .platform-instagram { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
  .platform-youtube { background: #FF0000; }
  .platform-facebook { background: #1877f2; }
  .platform-website { background: #2d5a8e; }

  .card-content { flex: 1; min-width: 0; }
  .card-title {
    font-size: 14px; font-weight: 700; margin-bottom: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-title.no-title { color: rgba(255,255,255,0.4); font-weight: 400; font-style: italic; }
  .card-meta { font-size: 11px; color: rgba(255,255,255,0.4); }
  .card-arrow { color: rgba(255,255,255,0.25); font-size: 16px; flex-shrink: 0; }

  .empty { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.35); font-size: 15px; }

  #results-count {
    padding: 6px 16px 2px;
    font-size: 12px; color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="header-icon">🍳</span>
    <div>
      <div class="header-title">מתכונים</div>
      <div class="header-sub">קבוצת הוואטסאפ</div>
    </div>
    <div class="header-count" id="total-count"></div>
  </div>
  <input class="search-bar" type="search" placeholder="🔍 חפש מתכון..." id="search" oninput="render()" />
</div>

<div class="filters" id="filters"></div>
<div id="results-count"></div>
<div class="list" id="list"></div>

const PLATFORMS = {
  tiktok:    { label: "TikTok",     emoji: "🎵", color: "platform-tiktok" },
  instagram: { label: "Instagram",  emoji: "📸", color: "platform-instagram" },
  youtube:   { label: "YouTube",    emoji: "▶️", color: "platform-youtube" },
  facebook:  { label: "Facebook",   emoji: "👍", color: "platform-facebook" },
  website:   { label: "אתר",        emoji: "🌐", color: "platform-website" },
};

const FILTER_COLORS = {
  all: "#e85d00",
  tiktok: "#010101",
  instagram: "#dc2743",
  youtube: "#FF0000",
  facebook: "#1877f2",
  website: "#2d5a8e",
};

let activeFilter = "all";

// Build filters
const counts = {};
for (const p of Object.keys(PLATFORMS)) {
  counts[p] = RECIPES.filter(r => r.platform === p).length;
}

const filtersEl = document.getElementById("filters");
const allFilters = [["all", "🍽️", "הכל", RECIPES.length], ...Object.entries(PLATFORMS).map(([k,v]) => [k, v.emoji, v.label, counts[k]])];

allFilters.forEach(([key, emoji, label, count]) => {
  const btn = document.createElement("button");
  btn.className = "filter-btn" + (key === "all" ? " active" : "");
  btn.style.background = key === "all" ? FILTER_COLORS[key] : "rgba(255,255,255,0.1)";
  btn.innerHTML = `${emoji} ${label} <span class="filter-count">${count}</span>`;
  btn.onclick = () => {
    activeFilter = key;
    document.querySelectorAll(".filter-btn").forEach(b => {
      b.classList.remove("active");
      b.style.background = "rgba(255,255,255,0.1)";
    });
    btn.classList.add("active");
    btn.style.background = FILTER_COLORS[key] || "#e85d00";
    render();
  };
  filtersEl.appendChild(btn);
});

document.getElementById("total-count").textContent = RECIPES.length + " מתכונים";

function render() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const filtered = RECIPES.filter(r => {
    if (activeFilter !== "all" && r.platform !== activeFilter) return false;
    if (q && !r.title.toLowerCase().includes(q) && !r.url.toLowerCase().includes(q) && !r.date.includes(q)) return false;
    return true;
  });

  document.getElementById("results-count").textContent =
    filtered.length < RECIPES.length ? `מציג ${filtered.length} תוצאות` : "";

  const list = document.getElementById("list");
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">😕 לא נמצאו תוצאות</div>';
    return;
  }

  list.innerHTML = filtered.map(r => {
    const p = PLATFORMS[r.platform] || PLATFORMS.website;
    const hasTitle = r.title && r.title.trim().length > 0;
    const titleText = hasTitle ? r.title : "ללא כותרת";
    const titleClass = hasTitle ? "card-title" : "card-title no-title";
    return `<a class="recipe-card" href="${r.url}" target="_blank" rel="noopener">
      <div class="platform-icon ${p.color}">${p.emoji}</div>
      <div class="card-content">
        <div class="${titleClass}">${titleText}</div>
        <div class="card-meta">${p.label} · ${r.date}</div>
      </div>
      <span class="card-arrow">←</span>
    </a>`;
  }).join("");
}

render();
</script>
